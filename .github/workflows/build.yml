name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. new pushes to a PR)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm # caches the global ~/.npm download cache, keyed on package-lock.json

      - name: Install dependencies
        run: npm ci

      # Speeds up `expo export` by reusing Metro's transform cache between runs.
      - name: Cache Metro / Expo bundler
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache
            ${{ runner.temp }}/metro-cache
          key: metro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            metro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            metro-${{ runner.os }}-

      - name: Lint
        run: npm run lint

      # Same codebase, two single-museum static exports (EXPO_PUBLIC_SITE picks
      # which museum tab is shown — see app/(tabs)/_layout.tsx and app.config.js).
      - name: Web build — Met (metroulette.com)
        run: npx expo export --platform web --output-dir dist-met
        env:
          EXPO_PUBLIC_SITE: met

      - name: Web build — MoMA (momaroulette.com)
        run: npx expo export --platform web --output-dir dist-moma
        env:
          EXPO_PUBLIC_SITE: moma

      # Deploy the freshly-built dist-met/dist-moma to their own Cloudflare
      # Workers. Only on pushes to main — PR runs still lint + build for
      # validation but never publish.
      - name: Deploy Met to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config wrangler.met.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy MoMA to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config wrangler.moma.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
