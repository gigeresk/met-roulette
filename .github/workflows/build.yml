name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. new pushes to a PR)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm # caches the global ~/.npm download cache, keyed on package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Same codebase, two single-museum static exports (EXPO_PUBLIC_SITE picks
      # which museum tab is shown — see app/(tabs)/_layout.tsx and app.config.js).
      #
      # --clear is required: Metro's transform cache is keyed on file content,
      # not on process.env values read inside those files, so without it the
      # second export silently reuses the first export's inlined EXPO_PUBLIC_SITE
      # and ships the wrong museum. (No Metro cache step here for the same
      # reason — a cross-run cache would reintroduce the same bug.)
      - name: Web build — Met (metroulette.com)
        run: npx expo export --platform web --output-dir dist-met --clear
        env:
          EXPO_PUBLIC_SITE: met

      - name: Web build — MoMA (momaroulette.com)
        run: npx expo export --platform web --output-dir dist-moma --clear
        env:
          EXPO_PUBLIC_SITE: moma

      # Deploy the freshly-built dist-met/dist-moma to their own Cloudflare
      # Workers. Only on pushes to main — PR runs still lint + build for
      # validation but never publish.
      - name: Deploy Met to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config wrangler.met.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy MoMA to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config wrangler.moma.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
